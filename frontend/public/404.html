<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect
      // Redirige todos los 404 al index.html y deja que React Router maneje la navegación
      if (window.location.pathname !== '/virtual-pet-manager/') {
        window.location.replace('/virtual-pet-manager/#' + window.location.pathname.split('/').slice(3).join('/'));
      }
    </script>
  </head>
  <body>
  </body>
</html>
